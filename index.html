<!DOCTYPE html>

    <style>
        body {

            color: #ff3333;
            font-family: 'Courier New', Courier, monospace;
            padding: 15px;
            margin: 0;
            font-size: 13px;
            line-height: 1.5;
            background-image: radial-gradient(rgba(30, 0, 0, 0.75), black 120%);
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
        }
        .header {
            color: #ffffff;
            border-bottom: 2px solid #ff3333;
            padding-bottom: 5px;
            margin-bottom: 15px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
        }
        .console-line {
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .success { color: #00ff33; }
        .warning { color: #ffcc00; }
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="terminal">

        let lines = [];

        // Fetch real network data to inject into the hack sequence
        fetch('https://ip-api.com')

            .then(data => {
                const ip = data.query || "192.168.1.104";

                const isp = data.isp || "Mobile Gate";

                lines = [
                    `[+] TARGET CONNECTED: <span class="success">ONLINE</span>`,

                    `[-] EXPLOITING KERNEL MEMORY HASH... <span class="success">SUCCESS</span>`,
                    `[!] <span class="warning">DUMPING INTERNAL FILESYSTEM:</span>`,

                    `    /User/Media/DCIM/Camera/IMG_0412.JPG -> <span class="success">EXTRACTED</span>`,
                    `    /User/Library/SMS/sms.db -> <span class="success">EXTRACTED</span>`,
                    `[!] <span class="warning">WARNING: ROOT PRIVILEGES GRANTED</span>`,
                    `[-] ERASING FIRMWARE STORAGE CORES...`,

                    `<span class="blink" style="color:#fff; font-weight:bold;">[!!!] SYSTEM WIPING IN PROGRESS [!!!]</span>`
                ];
                runTerminal(0);
            });

        function runTerminal(index) {
            if (index < lines.length) {
                const div = document.createElement('div');
                div.className = 'console-line';
                div.innerHTML = lines[index];
                terminal.appendChild(div);
                
                // Keep scrolling down as text prints
                window.scrollTo(0, document.body.scrollHeight);
                
                // Timing between lines to make it look like a real running script
                setTimeout(() => runTerminal(index + 1), 600);
